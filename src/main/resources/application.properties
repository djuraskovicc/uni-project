quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=short
quarkus.datasource.password=password

quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/spotify_copy
quarkus.datasource.jdbc.max-size=16

quarkus.hibernate-orm.schema-management.strategy = update
quarkus.hibernate-orm.log.sql=true

quarkus.oidc.auth-server-url=http://localhost:8000/realms/spotify-realm
quarkus.oidc.client-id=quarkus-app
quarkus.oidc.roles.role-claim-path=realm_access/roles
quarkus.http.auth.permission.authenticated.paths=/*
quarkus.http.auth.permission.authenticated.policy=authenticated

quarkus.rest-client.time-api.url=https://timeapi.io/api/
quarkus.rest-client.ipify-api.url=https://api.ipify.org
quarkus.rest-client.time-api.scope=jakarta.inject.Singleton
quarkus.rest-client.euro-rates-api.url=https://api.euroratesapi.dev/api/